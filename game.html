    <script>
let reelData = [];  // 存放 Base Game 滾輪數據
let longreelData = [];
let baseGameScore = 0;  // 存放 Base Game 當前得分
let winSpins = 0;     // 有贏分的 spin 次數
let randomPositions = [];
let mainGameMode = 'base_game';  // 預設大玩法模式 (Hold & Spin 或 Base Game)        
let gameMode = [];  // 遊戲模式保持全局變數，避免被重製
let firstSequence = []
let totalSequence = [];
let displayOrder = [];
let win = [];
let scoreVector = [];
let originalScores = [];
let spinIndex = 0;
let countdown = 3;
let slotCells;
let filledPositions = [];
let totalScore = 10000;
let hits = 0;
let totalSpins = 0;
let bet = 50
let RTPbet = 0;
let featuregame = 0
let Fhit = [0,0,0,0,0,0,0]
let isSpinning = false; // 是否正在執行滾輪動畫
let isSkipping = false; // 是否跳過動畫
let spinLengths = [10, 15, 20, 25, 30];  // 每條滾輪滾動長度不同
let baseDuration = [];  // 基礎滾動時間（以最大滾動距離計算）
const symbolPool = ['M1', 'M2', 'M3', 'M4', 'M5', 'A', 'K', 'Q', 'J', 'TE','WW'];
let isSpaceLocked = false; // 空格键锁定标志
let spaceLockTimer = null; // 定时器变量
let autoSpinActive = false;
let autoSpinInterval = null;
function setSpinSpeed(speed) {
    const fastButton = document.getElementById('fastSpinButton');
    const slowButton = document.getElementById('slowSpinButton');
    if (speed === 'fast') {
        spinLengths = [8, 8, 8, 8, 8];
        baseDuration = 450;
        console.log('Fast Spin activated', spinLengths);
        fastButton.classList.add('active');
        slowButton.classList.remove('active');
    } else if (speed === 'slow') {
        spinLengths = [10, 15, 20, 25, 30];
        baseDuration = 1500;
        console.log('Slow Spin activated', spinLengths);
        slowButton.classList.add('active');
        fastButton.classList.remove('active');
    }
}
function toggleAutoSpin() {
    const autoSpinButton = document.getElementById('autoSpinButton');
    autoSpinActive = !autoSpinActive;

    if (autoSpinActive) {
        console.log('Auto Spin activated');
        autoSpinButton.classList.add('active');

        const interval = spinLengths[0] === 8 ? baseDuration*1.1 : baseDuration*1.1;

        autoSpinInterval = setInterval(() => {
            console.log('Auto Spin triggered');
            const event = new KeyboardEvent('keydown', { code: 'Space', bubbles: true });
            Object.defineProperty(event, 'isAutoSpin', { value: true }); // 添加自定义属性
            document.dispatchEvent(event);
        }, interval);
    } else {
        console.log('Auto Spin deactivated');
        autoSpinButton.classList.remove('active');
        clearInterval(autoSpinInterval);
    }
}
function lockSpaceKey(duration) {
    isSpaceLocked = true; // 锁定空白键
    console.log(`空白鍵被鎖定 ${duration} 秒`);

    // 清除之前的计时器（如果存在）
    if (spaceLockTimer) {
        clearTimeout(spaceLockTimer);
    }

    // 设置定时器解锁
    spaceLockTimer = setTimeout(() => {
        isSpaceLocked = false;
        console.log("空白鍵已解鎖");
    }, duration * 1000); // 转换为毫秒
}
// 確保 data 加載後再執行運算
window.onload = function() {
    const spinStatusElement = document.getElementById('spinStatus');
    if (spinStatusElement) {
        spinStatusElement.textContent = 'Slow';
    }
    document.getElementById('slowSpinButton').classList.add('active');
    console.log('DOM Loaded');
    slotCells = document.querySelectorAll('.slot-cell');
    bindEvents();
    initializeGame();
    runGame(data,spinLengths);
    initializeReels();
    // 預設選中綠色玩法按鈕
};

//滾輪
function initializeReels() {
    let reels = document.querySelectorAll('.reel-inner');
    reels.forEach(reel => {
        generateReelSymbols(reel, 4);  // 生成 4 個初始符號
    });
}

// 生成指定數量的符號，預設為 4 個
function generateReelSymbols(reel, spins) {
    let fragment = document.createDocumentFragment();
    for (let i = 0; i < spins; i++) {
        let symbol = document.createElement('div');
        symbol.classList.add('reel-symbol');
        let randomSymbol = symbolPool[Math.floor(Math.random() * symbolPool.length)];
        symbol.style.backgroundImage = `url('picture_base/${randomSymbol}.png')`;
        symbol.style.height = '100px';
        symbol.style.marginBottom = '12px';
        fragment.appendChild(symbol);  // 新符號從滾輪頂部加入
    }
    reel.appendChild(fragment);  // 一次性加入，減少重排
}
function loadReelSymbols(reel, spins,index) {
    let fragment = document.createDocumentFragment();
    let symbolMap = []
    if(index==0){
        symbolMap = {0: "WW",1: "C7",2: "C7",3: "M1",4: "M2",5: "M3",6: "M4",7: "M5",9: "A",10: "K",11: "Q",12: "J",13: "TE",14: "C8",15: "C9",};
    }else if(index == 1){
        symbolMap = {0: "WW",1: "C8",2: "C8",3: "M1",4: "M2",5: "M3",6: "M4",7: "M5",9: "A",10: "K",11: "Q",12: "J",13: "TE",14: "C8",15: "C9",};
    }else{
        symbolMap = {0: "WW",1: "C9",2: "C9",3: "M1",4: "M2",5: "M3",6: "M4",7: "M5",9: "A",10: "K",11: "Q",12: "J",13: "TE",14: "C9",15: "C9",};
    }
    longreelData[index].forEach((symbolKey, i) => {
        if (i >= spins) return; // 超過 spins 數量則停止添加
        let symbol = document.createElement('div');
        symbol.classList.add('reel-symbol');
        let symbolImage = symbolMap[symbolKey];
        if (!symbolImage) {
            console.error(`Symbol ${symbolKey} does not have a valid image mapping.`);
            return;
        }
        symbol.style.backgroundImage = `url('picture_base/${symbolImage}.png')`;
        symbol.style.height = '100px';
        symbol.style.marginBottom = '12px';
        fragment.appendChild(symbol);
    });

    reel.appendChild(fragment); // 一次性加入滾輪
}
// 滾輪滾動動畫邏輯
function spinReelAnimation(reel, spins, duration,index) {
    let inner = reel.querySelector('.reel-inner');
    // 1. 保留最後 4 個符號
    let preservedSymbols = Array.from(inner.querySelectorAll('.reel-symbol')).slice(0,4);
    inner.innerHTML = ''; 
    // 2. 生成新的符號
    loadReelSymbols(inner,longreelData,index);

    // 拼接舊符號到新符號上方
    preservedSymbols.forEach(symbol => {
        inner.appendChild(symbol.cloneNode(true));
    });

    // 3. 拼接舊符號到新符號上方，確保銜接
    let symbols = inner.querySelectorAll('.reel-symbol');
    if (symbols.length === 0) {
        console.error('滾輪內沒有符號，無法滾動');
        return;
    }
    inner.style.transition = 'none';
    inner.style.transform = 'translateY(0)';  // 重置滾輪位置
    let symbolHeight = symbols[0].offsetHeight + 12;  // 符號高度 + 間隔
    let offset = symbolHeight * (spins+1);  // 滾動距離

    // 啟動滾動動畫
    inner.style.transition = `transform ${duration}ms linear`;
    inner.style.transform = `translateY(${offset}px)`;  // 滾動向下
    let skipCheckInterval = setInterval(() => {
        if (isSkipping) {
            clearInterval(skipCheckInterval);
            inner.style.transition = 'none'; // 取消動畫
            inner.style.transform = `translateY(${offset - symbolHeight}px)`; // 設置到回彈位置
            removeExcessSymbols(inner, spins + 4);
            onComplete(); // 通知當前滾輪完成
        }
    }, 50);
    // 滾動結束後重置滾輪
    setTimeout(() => {
        if (!isSkipping) {
            clearInterval(skipCheckInterval);
            inner.style.transition = 'transform 0.3s ease-out';
            let reboundOffset = offset - symbolHeight;
            inner.style.transform = `translateY(${reboundOffset}px)`;
            setTimeout(() => {
                removeExcessSymbols(inner, spins + 4);
            }, 300);
        }

        // 設置為非旋轉狀態
        let reels = document.querySelectorAll('.reel');
        if (reel === reels[reels.length - 1]) { // 最後一個滾輪結束時
            isSpinning = false; // 動畫完成
            isSkipping = false; // 重置跳過狀態
        }
    }, duration);
}


// 移除滾輪內多餘的符號
function removeExcessSymbols(reel, targetLength) {
    let symbols = reel.querySelectorAll('.reel-symbol');
    let excessCount = symbols.length - targetLength;

    for (let i = 0; i < excessCount; i++) {
        symbols[symbols.length - 1].remove();  // 移除滾輪最下方多餘的符號
    }
}

// 在每次 SPIN 前清理符號 (保持穩定)
function cleanUpReelSymbols() {
    let reels = document.querySelectorAll('.reel-inner');
    let spinLengths = [10, 15, 20, 25, 30];

    reels.forEach((reel, index) => {
        removeExcessSymbols(reel, spinLengths[index] + 4);  // 保持滾輪穩定
    });
}

// 啟動所有滾輪動畫
function spinAllReels() {
    if (isSpinning) {
        isSkipping = true; // 正在旋轉時按下 Spin，觸發跳過動畫
        return;
    }
    isSpinning = true; // 標記為旋轉中
    isSkipping = false; // 重置跳過標記
    let reels = document.querySelectorAll('.reel');

    let maxSpins = Math.max(...spinLengths);  // 找出最大滾輪距離
    let completedReels = 0;
    cleanUpReelSymbols();
    reels.forEach((reel, index) => {
        let spins = spinLengths[index];
        let duration = baseDuration * (spins / maxSpins);  // 按比例縮放滾動時間
        setTimeout(() => {
            spinReelAnimation(reel, spinLengths[index], duration,index);
            completedReels++;
            if (completedReels === reels.length) {
                setTimeout(() => {
                updateScoreDisplay();  // 所有滾輪完成後更新分數
            }, baseDuration);
            }
            isSpinning = false;
            isSkipping = false;
        }, );
        setTimeout(() => {
            let currentSymbols = Array.from(reel.querySelectorAll('.reel-symbol'))
                .map(symbol => symbol.style.backgroundImage.match(/\/(\w+).png/)[1]);
            console.log(`滾輪 ${index + 1}:`, currentSymbols);
        },  baseDuration*1.08);  // 滾動動畫+回彈後打印
    });
}

function updateReelAnimation(cell1, spins, ete,fix1,fix2,i,currentScores,tt) {
    let map = {0: "FG_WW",1: "FG_M1",2: "FG_M2",3: "FG_M3",4: "FG_M4",5: "FG_M5",6: "FG_A",7: "FG_K",9: "FG_Q",10: "FG_J",11: "FG_Ten",};
    let reelSymbols = Array(spins).fill().map(() => {
    let values = Object.values(map);
    return values[Math.floor(Math.random() * values.length)];
});
    let replaceCount = Math.round(0.2 * spins);
    // 随机选择索引进行替换
    let indices = Array.from({ length: spins }, (_, i) => i);
    let selectedIndices = [];
    for (let i = 0; i < replaceCount; i++) {
        let randomIndex = indices.splice(Math.floor(Math.random() * indices.length), 1)[0];
        selectedIndices.push(randomIndex);
    }
    // 替换选定索引的符号
    selectedIndices.forEach(index => {
        reelSymbols[index] = `C${fix1}`;
    }); // 根据 fix1 生成符号
    // 如果 fix2 = 1，则将第二个位置替换为 C${fix1}
    if (fix2 === 1) {
        reelSymbols[1] = `C${fix1}`;
    }else{
        let randomValue = Object.values(map)[Math.floor(Math.random() * Object.values(map).length)];
        reelSymbols[1] = randomValue;
    } // 根据 fix1 生成符号
    
    spinReelAnimationForSlotCells(cell1, reelSymbols, ete,currentScores,tt,i);
}

    scoreElement.style.left = '50%';
    scoreElement.style.transform = 'translate(-50%, -50%)';
    scoreElement.style.fontWeight = 'bold';

    scoreElement.style.fontSize = '24px';

    if (scores === 3500) {

            scoreElement.innerHTML = `

                    ${multiplier > 1 ? `<div class="multiplier-text">X${multiplier}</div>` : ''}
                </div>`;

        } else if (scores === 2000) {
            scoreElement.innerHTML = `
                <div class="minor-container">
                    <div class="minor-text">MINOR</div>
                    ${multiplier > 1 ? `<span class="multiplier-text">X${multiplier}</span>` : ''}
                </div>`;
                scoreElement.style.color = 'blue';
        } else {
            scoreElement.textContent = currentScores;
            scoreElement.style.color = 'black';
        }
    return scoreElement;
}
document.addEventListener('keydown', function(event) {
    if (event.code === 'Space') {
        if (isSpaceLocked) {
            console.log("空格键被锁定，暂时无法使用");
            return;
        }

        // ✅ 阻止默认行为（避免滚动）
        event.preventDefault();

        // ✅ 确保 `Space` 只在 `body` 触发，而不会在 `button` 被 `focus` 时触发
        if (event.target.tagName === "BUTTON") {
            event.target.blur(); // ✅ 取消 `button` 的 `focus`
        }

        // ✅ 只执行 `Spin` 按钮点击
        document.getElementById('spinButton').click();
    }

    // **CapsLock 触发 New Game**
    if (event.code === 'CapsLock') {
        event.preventDefault();
        document.getElementById('resetButton').click();
    }
});

function spinReelAnimationForSlotCells(cell1, reelSymbols,ete,currentScores,tt,i) {
    // 1. 保留最後 2 個符號
    let preservedSymbols1 = Array.from(cell1.querySelectorAll('.reel1-symbol')).slice(0,2);
    cell1.innerHTML = ''; 
    reelSymbols.forEach((symbolName,index) => {
        let symbol = document.createElement('div');
        symbol.classList.add('reel1-symbol');
        symbol.style.position = 'relative';
        symbol.style.backgroundImage = `url('picture_base/${symbolName}.png')`;
        symbol.style.height = '130px';
        symbol.style.backgroundSize = '130%';
        let y = parseInt(document.getElementById('betMultiplier').value);  // y 來自 Bet Multiplier
        let dim = parseFloat(document.getElementById('dimValue').value);   // dim 來自 Dim Value
        if (Math.random() < y * dim / 3500) {
            aa = 3500;
        } else if (Math.random() < y / 250) {
            aa = 1000;
        } else if (Math.random() < y / 500) {
            aa = 2000;
        } else {
            aa = rpoint(); // ✅ 可选：如果没有任何条件触发，设置默认值
        }
        let scoreElement = createScoreElement(aa, 1, aa);
  
        if (tt > 0 && index==1) {
        let extraScore = createScoreElement(currentScores[i], 1, currentScores[i]);
        console.log(currentScores[i])
        symbol.appendChild(extraScore);
        }else{
            if (["C0", "C1", "C2", "C6"].includes(symbolName)) {symbol.appendChild(scoreElement);}
        }
        cell1.appendChild(symbol);
    });
    preservedSymbols1.forEach(symbol => {
        cell1.appendChild(symbol.cloneNode(true));
    });
    let symbolHeight = 130;
    let spins = reelSymbols.length;
    let offset = symbolHeight * (spins + 1); 
    let baseDuration = 0; // **基准滚动时间**
    let perSymbolTime = ete; // **每个符号的滚动时间**
    let duration = baseDuration + (spins * perSymbolTime); // * *动态计算滚轮滚动时间**
    // 启动滚轮动画
    
    cell1.style.transition = `transform ${duration}ms linear`;
    cell1.style.transform = `translateY(${offset}px)`;

    setTimeout(() => {
        cell1.style.transition = 'transform 0.3s ease-out';
        let reboundOffset = offset - symbolHeight;
        cell1.style.transform = `translateY(${reboundOffset}px)`;
        setTimeout(() => {
            Array.from(cell1.querySelectorAll('.reel1-symbol')).slice(2,length.cell1).forEach(symbol => symbol.remove());
            cell1.style.transition = 'none';
            cell1.style.transform = `translateY(0px)`;
        }, 300);
    }, duration);
}
function handleGameMode(reelData) {
    const mode = checkSpecialConditions(reelData);
    if (mode) {
        console.log(`Triggering game mode: ${mode}`);
        setGameMode(mode, null); // 假设不需要 button，可以传入 null
    } else {
        console.log('No special conditions met.');
    }
}
function checkSpecialConditions(reelData) {
    // 展平 `reelData`，将二维数组转换为一维数组
    function randomPick(options) {
    let index = Math.floor(Math.random() * options.length);
    return options[index];
    }
    let flattenedReelData = reelData.flat();
    // 统计各符号的出现次数
    let counts = {};
    flattenedReelData.forEach(symbol => {
        counts[symbol] = (counts[symbol] || 0) + 1;
    });
    // 检查满足的条件并返回对应的 mode
    if (counts[1] >= 2 && counts[2] >= 1) {
        // 随机从 green, Red, Blue 中选择一个
        featuregame = 1
        return randomPick(['green', 'Red', 'Blue']);
    } else if (counts[1] >= 2 && counts[14] >= 1) {
        // 随机从 g_b, g_r, r_b 中选择一个
        featuregame = 2
        return randomPick(['g_b', 'g_r', 'r_b']);
    } else if (counts[1] >= 2 && counts[15] >= 1) {
        // 直接进入 g_r_b
        featuregame = 3
        return 'g_r_b';
    }
    return null; // 如果没有满足条件，返回 null
}
